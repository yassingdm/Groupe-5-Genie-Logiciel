name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: grp5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: grp5/pom.xml

      - name: Build and run tests
        run: mvn -B clean verify

      - name: SonarQube Cloud Scan
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.projectKey=yassingdm_Groupe-5-Genie-Logiciel
          -Dsonar.organization=yassingdm
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.qualitygate.wait=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Show Sonar analysis task
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          if [ -f target/sonar/report-task.txt ]; then
            cat target/sonar/report-task.txt
          else
            echo "target/sonar/report-task.txt not found"
            exit 1
          fi
